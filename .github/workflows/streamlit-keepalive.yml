name: Streamlit Keepalive

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          set -euo pipefail
          curl --fail --silent --show-error --location \
            --retry 3 \
            --retry-delay 5 \
            --max-time 60 \
            "https://seo-audit-python.streamlit.app/?keepalive=$(date +%s)" \
            > /dev/null
