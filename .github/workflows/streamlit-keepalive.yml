name: Streamlit Keepalive

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Streamlit app
        run: |
          set -euo pipefail
          APP_URL="https://seo-audit-python.streamlit.app"
          USER_AGENT="Mozilla/5.0 (compatible; GitHubActionsKeepAlive/1.0)"

          for endpoint in \
            "${APP_URL}/_stcore/health" \
            "${APP_URL}/healthz" \
            "${APP_URL}/"; do
            code="$(curl --silent --show-error \
              --output /tmp/keepalive-response.txt \
              --write-out "%{http_code}" \
              --retry 3 \
              --retry-delay 5 \
              --max-time 60 \
              --user-agent "${USER_AGENT}" \
              "${endpoint}")"

            echo "Endpoint: ${endpoint}"
            echo "HTTP: ${code}"

            if [ "${code}" -ge 200 ] && [ "${code}" -lt 400 ]; then
              exit 0
            fi
          done

          echo "Keepalive failed for all endpoints."
          cat /tmp/keepalive-response.txt || true
          exit 1
